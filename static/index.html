<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q版3D生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            color: #2d3748;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 40px;
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: #e2e8f0;
            border-radius: 12px;
            padding: 4px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            color: #4a5568;
            transition: all 0.2s;
        }
        .tab.active {
            background: #fff;
            color: #2d3748;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .panel { display: none; }
        .panel.active { display: block; }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .subject-section {
            margin-bottom: 24px;
        }
        .field-label {
            display: block;
            color: #2d3748;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .subject-switch {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 6px;
        }
        .subject-option {
            border: 0;
            border-radius: 8px;
            background: transparent;
            color: #4a5568;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            min-height: 42px;
            transition: background 0.2s, color 0.2s, box-shadow 0.2s;
        }
        .subject-option.active {
            background: #fff;
            color: #2d3748;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .upload-zone {
            border: 2px dashed #cbd5e0;
            border-radius: 12px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #667eea;
            background: #f7f8ff;
        }
        .upload-zone input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .upload-text { color: #718096; }
        .preview-img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 16px;
            display: none;
        }
        .preview-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
        }
        .btn-secondary {
            width: auto;
            padding: 9px 14px;
            background: #edf2f7;
            color: #2d3748;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
            border-color: #a0aec0;
        }
        .btn-secondary:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .btn-secondary:disabled:hover {
            background: #edf2f7;
            border-color: #cbd5e0;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 16px;
            font-size: 15px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: #667eea; }
        .hint {
            color: #a0aec0;
            font-size: 13px;
            margin-top: 8px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result {
            margin-top: 32px;
            display: none;
        }
        .result h3 {
            color: #2d3748;
            margin-bottom: 12px;
        }
        .result-content {
            background: #f7fafc;
            border-radius: 10px;
            padding: 20px;
            white-space: pre-wrap;
            word-break: break-all;
            color: #4a5568;
            line-height: 1.6;
        }
        .result-content img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 12px;
        }
        .loading {
            text-align: center;
            padding: 24px;
            color: #718096;
        }
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error {
            background: #fff5f5;
            color: #c53030;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Q版3D生成器</h1>
        <p class="subtitle">上传宠物或人物照片，也可以输入描述生成可爱的专属Q版3D形象</p>

        <div class="tabs">
            <div class="tab active" data-tab="image">上传图片</div>
            <div class="tab" data-tab="text">文字描述</div>
            <div class="tab" data-tab="direct3d">图生3D</div>
        </div>

        <div class="card">
            <div class="subject-section" id="subject-section">
                <label class="field-label">生成对象</label>
                <div class="subject-switch" role="radiogroup" aria-label="生成对象">
                    <button type="button" class="subject-option active" data-subject="pet" aria-pressed="true">宠物</button>
                    <button type="button" class="subject-option" data-subject="person" aria-pressed="false">人物</button>
                </div>
            </div>

            <div class="panel active" id="panel-image">
                <div class="upload-zone" id="upload-zone">
                    <div class="upload-icon">📷</div>
                    <p class="upload-text" id="upload-text">点击或拖拽上传宠物照片，生成专属Q版形象</p>
                    <p class="hint">支持 JPG / PNG，最大 20MB</p>
                    <input type="file" id="file-input" accept="image/*">
                </div>
                <img class="preview-img" id="preview-img">
                <div class="preview-actions" id="preview-actions">
                    <button type="button" class="btn-secondary" id="btn-remove-image" disabled>移除图片</button>
                </div>
                <button class="btn" id="btn-image" disabled>生成Q版3D图像</button>
            </div>

            <div class="panel" id="panel-text">
                <textarea id="desc-input" placeholder="请详细描述宠物专属特征...&#10;&#10;例如：一只橘色英短猫，圆脸大眼，浅橘毛色，胸前有白色斑块，短粗尾巴，戴红色项圈，坐姿，微笑表情"></textarea>
                <p class="hint" id="desc-hint">宠物模式会优先保留照片里的品种、毛色花纹、眼睛、耳朵鼻口、体态、表情神态和配饰等专属特征</p>
                <button class="btn" id="btn-text">生成Q版3D图像</button>
            </div>

            <div class="panel" id="panel-direct3d">
                <div class="upload-zone" id="upload-zone-3d">
                    <div class="upload-icon">🧊</div>
                    <p class="upload-text">点击或拖拽上传图片，直接生成3D模型</p>
                    <p class="hint">最多4张：第1张为正面主图，第2-4张分别为背面、左侧、右侧视角(Pro版)。Rapid版仅用第一张</p>
                    <input type="file" id="file-input-3d" accept="image/*" multiple>
                </div>
                <div id="preview-container-3d" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:12px;"></div>
                <div style="display:flex; gap:12px; margin-top:16px; align-items:center;">
                    <select id="mode-select-direct" style="padding:10px 16px; border-radius:8px; border:1px solid #e2e8f0; font-size:14px;">
                        <option value="pro">Pro版 (高质量, 支持多图, 2-5分钟)</option>
                        <option value="rapid">Rapid版 (快速, 仅单图, 约1分钟)</option>
                    </select>
                </div>
                <button class="btn" id="btn-direct3d" disabled>生成3D模型</button>
                <div class="result" id="result-direct3d" style="display:none; margin-top:16px;">
                    <h3>3D模型结果</h3>
                    <div class="result-content" id="result-direct3d-content"></div>
                </div>
            </div>

            <div class="error" id="error"></div>

            <div class="result" id="result">
                <h3>Q版图像结果</h3>
                <div class="result-content" id="result-content"></div>
                <div class="gen3d-section" id="gen3d-section" style="display:none; margin-top:20px;">
                    <h3>生成3D模型</h3>
                    <div style="display:flex; gap:12px; margin-top:12px;">
                        <select id="mode-select" style="padding:10px 16px; border-radius:8px; border:1px solid #e2e8f0; font-size:14px;">
                            <option value="pro">Pro版 (高质量, 2-5分钟)</option>
                            <option value="rapid">Rapid版 (快速, 约1分钟)</option>
                        </select>
                        <button class="btn" id="btn-3d" style="width:auto; margin-top:0; padding:10px 24px;">生成3D模型</button>
                    </div>
                    <div class="result" id="result-3d" style="display:none; margin-top:16px;">
                        <div class="result-content" id="result-3d-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tabs = document.querySelectorAll('.tab');
        const panels = document.querySelectorAll('.panel');
        const fileInput = document.getElementById('file-input');
        const uploadZone = document.getElementById('upload-zone');
        const previewImg = document.getElementById('preview-img');
        const previewActions = document.getElementById('preview-actions');
        const btnImage = document.getElementById('btn-image');
        const btnRemoveImage = document.getElementById('btn-remove-image');
        const btnText = document.getElementById('btn-text');
        const descInput = document.getElementById('desc-input');
        const resultDiv = document.getElementById('result');
        const resultContent = document.getElementById('result-content');
        const errorDiv = document.getElementById('error');
        const subjectSection = document.getElementById('subject-section');
        const subjectOptions = document.querySelectorAll('.subject-option');
        const uploadText = document.getElementById('upload-text');
        const descHint = document.getElementById('desc-hint');

        let selectedFile = null;
        let selectedFileUrl = null;
        let currentSubject = 'pet';

        const subjectCopy = {
            pet: {
                uploadText: '点击或拖拽上传宠物照片，生成专属Q版形象',
                placeholder: '请详细描述宠物专属特征...\n\n例如：一只橘色英短猫，圆脸大眼，浅橘毛色，胸前有白色斑块，短粗尾巴，戴红色项圈，坐姿，微笑表情',
                hint: '宠物模式会优先保留照片里的品种、毛色花纹、眼睛、耳朵鼻口、体态、表情神态和配饰等专属特征',
                emptyText: '请输入宠物描述'
            },
            person: {
                uploadText: '点击或拖拽上传人物照片，生成专属Q版形象',
                placeholder: '请详细描述人物专属特征...\n\n例如：短发年轻女性，圆脸，单眼皮，戴银色圆框眼镜，穿浅蓝色连帽卫衣，微笑，站姿，干净背景',
                hint: '人物模式会优先保留照片里的发型、脸型、五官气质、表情神态、服装和配饰等专属特征',
                emptyText: '请输入人物描述'
            }
        };

        function updateSubjectCopy() {
            const copy = subjectCopy[currentSubject];
            uploadText.textContent = copy.uploadText;
            descInput.placeholder = copy.placeholder;
            descHint.textContent = copy.hint;
        }

        subjectOptions.forEach(option => {
            option.addEventListener('click', () => {
                currentSubject = option.dataset.subject;
                subjectOptions.forEach(o => {
                    const isActive = o === option;
                    o.classList.toggle('active', isActive);
                    o.setAttribute('aria-pressed', String(isActive));
                });
                updateSubjectCopy();
                hideError();
            });
        });

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                panels.forEach(p => p.classList.remove('active'));
                document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
                subjectSection.style.display = tab.dataset.tab === 'direct3d' ? 'none' : 'block';
                hideError();
                resultDiv.style.display = 'none';
            });
        });

        uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', e => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

        async function cloneFile(file) {
            const bytes = await file.arrayBuffer();
            return new File([bytes], file.name, { type: file.type, lastModified: file.lastModified });
        }

        function resetImageSelection(clearResult = true) {
            selectedFile = null;
            fileInput.value = '';
            if (selectedFileUrl) {
                URL.revokeObjectURL(selectedFileUrl);
                selectedFileUrl = null;
            }
            previewImg.removeAttribute('src');
            previewImg.style.display = 'none';
            btnImage.disabled = true;
            btnRemoveImage.disabled = true;
            window._lastImageUrl = null;
            if (clearResult) {
                resultDiv.style.display = 'none';
                resultContent.innerHTML = '';
                document.getElementById('gen3d-section').style.display = 'none';
                document.getElementById('result-3d').style.display = 'none';
                document.getElementById('result-3d-content').innerHTML = '';
            }
            hideError();
        }

        async function handleFile(file) {
            if (!file.type.startsWith('image/')) { showError('请上传图片文件'); return; }
            if (file.size > 20 * 1024 * 1024) { showError('图片大小不能超过20MB'); return; }
            btnImage.disabled = true;
            try {
                selectedFile = await cloneFile(file);
                if (selectedFileUrl) URL.revokeObjectURL(selectedFileUrl);
                selectedFileUrl = URL.createObjectURL(selectedFile);
                previewImg.src = selectedFileUrl;
                previewImg.style.display = 'block';
                btnImage.disabled = false;
                btnRemoveImage.disabled = false;
                resultDiv.style.display = 'none';
                resultContent.innerHTML = '';
                window._lastImageUrl = null;
                document.getElementById('gen3d-section').style.display = 'none';
                hideError();
            } catch (e) {
                resetImageSelection(false);
                showError('无法读取图片文件，请重新选择后再试');
            }
        }

        btnRemoveImage.addEventListener('click', () => resetImageSelection());

        btnImage.addEventListener('click', async () => {
            if (!selectedFile) return;
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('subject_type', currentSubject);
            await doGenerate('/generate/image', { method: 'POST', body: formData });
        });

        btnText.addEventListener('click', async () => {
            const desc = descInput.value.trim();
            if (!desc) { showError(subjectCopy[currentSubject].emptyText); return; }
            const formData = new FormData();
            formData.append('description', desc);
            formData.append('subject_type', currentSubject);
            await doGenerate('/generate/text', { method: 'POST', body: formData });
        });

        async function doGenerate(url, options) {
            hideError();
            resultDiv.style.display = 'block';
            resultContent.innerHTML = '<div class="loading"><span class="spinner"></span>生成中，请稍候...</div>';
            document.querySelectorAll('.btn').forEach(b => b.disabled = true);

            try {
                const resp = await fetch(url, options);
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.detail || `请求失败 (${resp.status})`);
                }
                const data = await resp.json();
                displayResult(data.content);
            } catch (e) {
                resultDiv.style.display = 'none';
                showError(e.message);
            } finally {
                btnImage.disabled = !selectedFile;
                btnText.disabled = false;
                document.getElementById('btn-3d').disabled = false;
            }
        }

        function displayResult(content) {
            const urlRegex = /(https?:\/\/[^\s"'<>]+\.(?:png|jpg|jpeg|gif|webp))/gi;
            const urls = content.match(urlRegex);
            if (urls) {
                let html = content;
                urls.forEach(u => { html = html.replace(u, `<img src="${u}" alt="Q版结果">`); });
                resultContent.innerHTML = html;
                window._lastImageUrl = urls[0];
                document.getElementById('gen3d-section').style.display = 'block';
            } else {
                resultContent.textContent = content;
                window._lastImageUrl = null;
                document.getElementById('gen3d-section').style.display = 'none';
            }
        }

        document.getElementById('btn-3d').addEventListener('click', async () => {
            const imageUrl = window._lastImageUrl;
            if (!imageUrl) { showError('没有可用的图片URL来生成3D模型'); return; }
            const mode = document.getElementById('mode-select').value;
            const result3d = document.getElementById('result-3d');
            const result3dContent = document.getElementById('result-3d-content');
            result3d.style.display = 'block';
            result3dContent.innerHTML = '<div class="loading"><span class="spinner"></span>提交3D生成任务...</div>';
            document.getElementById('btn-3d').disabled = true;

            try {
                const formData = new FormData();
                formData.append('image_url', imageUrl);
                formData.append('mode', mode);
                const resp = await fetch('/generate3d/submit', { method: 'POST', body: formData });
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.detail || `提交失败 (${resp.status})`);
                }
                const data = await resp.json();
                const jobId = data.job_id;
                result3dContent.innerHTML = `<div class="loading"><span class="spinner"></span>3D模型生成中... (Job: ${jobId})</div>`;
                await poll3DJob(jobId, mode, result3dContent);
            } catch (e) {
                result3dContent.innerHTML = `<div style="color:#c53030;">${e.message}</div>`;
            } finally {
                document.getElementById('btn-3d').disabled = false;
            }
        });

        async function poll3DJob(jobId, mode, container) {
            const maxAttempts = 60;
            for (let i = 0; i < maxAttempts; i++) {
                await new Promise(r => setTimeout(r, 5000));
                try {
                    const resp = await fetch(`/generate3d/query?job_id=${jobId}&mode=${mode}`);
                    const data = await resp.json();
                    if (data.status === 'DONE' || data.status === 'SUCCESS') {
                        let html = '<p style="color:#38a169; font-weight:600;">3D模型生成完成!</p>';
                        if (data.preview_url) {
                            html += `<img src="${data.preview_url}" alt="3D预览" style="max-width:100%;border-radius:8px;margin-top:12px;">`;
                        }
                        if (data.model_urls && Object.keys(data.model_urls).length > 0) {
                            html += '<div style="margin-top:16px;">';
                            for (const [fmt, url] of Object.entries(data.model_urls)) {
                                html += `<a href="${url}" target="_blank" style="display:inline-block;margin-right:12px;margin-top:8px;padding:10px 20px;background:#667eea;color:#fff;border-radius:8px;text-decoration:none;">下载 ${fmt}</a>`;
                            }
                            html += '</div>';
                        }
                        container.innerHTML = html;
                        return;
                    } else if (data.status === 'FAILED' || data.status === 'ERROR') {
                        container.innerHTML = '<div style="color:#c53030;">3D生成失败，请重试</div>';
                        return;
                    } else {
                        const progress = data.progress || 0;
                        container.innerHTML = `<div class="loading"><span class="spinner"></span>生成中... ${progress}%</div>`;
                    }
                } catch (e) {
                    container.innerHTML = `<div style="color:#c53030;">查询失败: ${e.message}</div>`;
                    return;
                }
            }
            container.innerHTML = '<div style="color:#c53030;">生成超时，请稍后查询</div>';
        }

        function showError(msg) { errorDiv.textContent = msg; errorDiv.style.display = 'block'; }
        function hideError() { errorDiv.style.display = 'none'; }

        // Direct image-to-3D tab
        const uploadZone3d = document.getElementById('upload-zone-3d');
        const fileInput3d = document.getElementById('file-input-3d');
        const previewContainer3d = document.getElementById('preview-container-3d');
        const btnDirect3d = document.getElementById('btn-direct3d');
        let selectedFiles3d = [];

        uploadZone3d.addEventListener('dragover', e => { e.preventDefault(); uploadZone3d.classList.add('dragover'); });
        uploadZone3d.addEventListener('dragleave', () => uploadZone3d.classList.remove('dragover'));
        uploadZone3d.addEventListener('drop', e => {
            e.preventDefault();
            uploadZone3d.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFiles3d(e.dataTransfer.files);
        });
        fileInput3d.addEventListener('change', () => { if (fileInput3d.files.length) handleFiles3d(fileInput3d.files); });

        async function handleFiles3d(files) {
            const fileList = Array.from(files).slice(0, 4);
            for (const file of fileList) {
                if (!file.type.startsWith('image/')) { showError('请上传图片文件'); return; }
                if (file.size > 20 * 1024 * 1024) { showError('单张图片不能超过20MB'); return; }
            }
            btnDirect3d.disabled = true;
            try {
                selectedFiles3d = await Promise.all(fileList.map(cloneFile));
                previewContainer3d.innerHTML = '';
                selectedFiles3d.forEach(file => {
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(file);
                    img.style.cssText = 'width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #e2e8f0;';
                    previewContainer3d.appendChild(img);
                });
                btnDirect3d.disabled = false;
                hideError();
            } catch (e) {
                selectedFiles3d = [];
                previewContainer3d.innerHTML = '';
                showError('无法读取图片文件，请重新选择后再试');
            }
        }

        btnDirect3d.addEventListener('click', async () => {
            if (!selectedFiles3d.length) return;
            const mode = document.getElementById('mode-select-direct').value;
            const container = document.getElementById('result-direct3d-content');
            const resultBox = document.getElementById('result-direct3d');
            resultBox.style.display = 'block';
            container.innerHTML = '<div class="loading"><span class="spinner"></span>提交3D生成任务...</div>';
            btnDirect3d.disabled = true;

            try {
                const formData = new FormData();
                selectedFiles3d.forEach(f => formData.append('files', f));
                formData.append('mode', mode);
                const url = selectedFiles3d.length > 1 ? '/generate3d/upload-multi' : '/generate3d/upload';
                if (selectedFiles3d.length === 1) {
                    formData.delete('files');
                    formData.append('file', selectedFiles3d[0]);
                }
                const resp = await fetch(url, { method: 'POST', body: formData });
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.detail || `提交失败 (${resp.status})`);
                }
                const data = await resp.json();
                const jobId = data.job_id;
                container.innerHTML = `<div class="loading"><span class="spinner"></span>3D模型生成中... (Job: ${jobId})</div>`;
                await poll3DJob(jobId, mode, container);
            } catch (e) {
                container.innerHTML = `<div style="color:#c53030;">${e.message}</div>`;
            } finally {
                btnDirect3d.disabled = false;
            }
        });
    </script>
</body>
</html>
